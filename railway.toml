[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python dashboard.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[deploy.healthCheck]
httpPath = "/"
timeout = 30

[service]
name = "weather-sniper-bot"

[environment]
# Railway injects these from dashboard Variables
# Copy from .env.example — set in Railway Dashboard > Variables
PYTHONUNBUFFERED = "1"
TZ = "UTC"
